<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - RESQ Kerala</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f27f0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#181411",
                    },
                    fontFamily: {
                        display: ["Lexend", "sans-serif"]
                    },
                    animation: {
                        'pop': 'pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'fade-up': 'fadeUp 0.8s ease-out forwards',
                        'fade-in': 'fadeIn 1.2s ease-out forwards',
                        'pulse-slow': 'pulseSlow 3s infinite',
                    },
                    keyframes: {
                        pop: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        fadeUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        pulseSlow: {
                            '0%, 100%': { transform: 'scale(1)', opacity: '0.1' },
                            '50%': { transform: 'scale(1.1)', opacity: '0.2' },
                        }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4 relative overflow-hidden text-white">

    <!-- Decorative background elements -->
    <div
        class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-primary/20 rounded-full blur-[100px] pointer-events-none -z-10 animate-pulse-slow">
    </div>

    <!-- Back to Main Login Button -->
    <a href="index.html"
        class="fixed top-6 left-6 z-50 px-5 py-2.5 flex items-center gap-2 rounded-full border border-white/20 text-white font-semibold backdrop-blur-md bg-white/5 hover:bg-white/20 hover:border-white/50 transition duration-300 animate-fade-in opacity-0"
        style="animation-delay: 0.5s;">
        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
        </svg>
        Back home
    </a>

    <div
        class="bg-white dark:bg-[#27211b] p-8 rounded-xl shadow-2xl w-full max-w-sm border border-white/5 animate-pop opacity-0 duration-500">
        <h1 class="text-3xl font-extrabold text-center text-primary mb-6">Admin Login</h1>

        <div class="space-y-5">
            <div>
                <label class="block font-semibold text-white mb-2">Username</label>
                <input type="text" id="username"
                    class="w-full p-3 rounded-xl border-2 border-orange-400 bg-[#1f1a15] text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition"
                    placeholder="Enter Username">
            </div>

            <div>
                <label class="block font-semibold text-white mb-2">Password</label>
                <input type="password" id="password"
                    class="w-full p-3 rounded-xl border-2 border-orange-400 bg-[#1f1a15] text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition"
                    placeholder="Enter Password">
            </div>

            <button onclick="login()"
                class="w-full h-14 mt-6 bg-primary text-white text-lg font-bold rounded-xl hover:opacity-90 transition shadow-lg shadow-orange-500/20">
                Login
            </button>

            <p class="text-xs text-center text-white/50 mt-4">
                Default: admin / password123
            </p>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            if (!username || !password) {
                alert("Please fill all fields");
                return;
            }

            const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
              ? 'http://localhost:5001'
              : 'https://resq-production-4525.up.railway.app';

            try {
                const response = await fetch(`${BACKEND_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("adminUser", username);
                    window.location.href = "admin_moni.html";
                } else {
                    alert(data.message || "Login failed");
                }
            } catch (err) {
                console.error(err);
                alert("Server error");
            }
        }
    </script>

</body>

</html>
