<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <title>Approval Pending</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>
</head>

<body class="bg-[#221910] min-h-screen flex items-center justify-center">

    <div class="text-white text-center bg-white/5 p-10 rounded-xl">

        <h1 class="text-2xl font-bold mb-4">Approval Pending</h1>
        <p class="text-slate-300 mb-6">
            Your account is under admin review.<br>
            Please wait for approval.
        </p>

        <button onclick="checkStatus()" class="px-6 py-3 bg-orange-500 rounded-xl mb-4 w-full">
            Refresh Status
        </button>
        <br>
        <button onclick="logout()" class="text-sm text-gray-400 hover:text-white underline">
            Logout
        </button>

    </div>

    <script>
        const phone = localStorage.getItem('phone');

        async function checkStatus() {
            if (!phone) {
                window.location.href = 'index.html';
                return;
            }

            const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
              ? 'http://localhost:5001'
              : 'https://resq-production-4525.up.railway.app';

            try {
                const res = await fetch(`${BACKEND_URL}/api/auth/status/${phone}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.status === 'approved') {
                        alert("Account Approved!");
                        window.location.href = 'mechanic_dash.html';
                    } else if (data.status === 'rejected') {
                        window.location.href = 'mechanic_rejected.html';
                    } else {
                        alert("Still pending approval. Please wait.");
                    }
                } else {
                    console.error("Failed to fetch status");
                }
            } catch (err) {
                console.error("Error connecting to server");
            }
        }

        function logout() {
            localStorage.removeItem('phone');
            localStorage.removeItem('role');
            window.location.href = 'index.html';
        }

        // Check on load too
        checkStatus();
    </script>

</body>

</html>
