<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - RESQ Kerala</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f27f0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: { display: ["Lexend"] }
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- 🔐 AUTH GUARD -->
    <script>
            (async () => {
                const phone = localStorage.getItem("phone");
                const role = localStorage.getItem("role");
                if (!phone || role !== "user") { window.location.href = "index.html"; return; }

                const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                  ? 'http://localhost:5001'
                  : 'https://resq-production-4525.up.railway.app';

                try {
                    const res = await fetch(`${BACKEND_URL}/api/user/profile/${phone}`);
                    if (!res.ok) { localStorage.clear(); window.location.href = "index.html"; }
                } catch (e) { /* Fail open */ }
            })();
    </script>

    <div class="flex h-screen overflow-hidden">

        <!-- SIDEBAR -->
        <aside class="w-72 bg-white dark:bg-[#181411] border-r border-slate-200 dark:border-slate-800 flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">car_repair</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold">RESQ Kerala</h1>
                    <p class="text-xs text-slate-500">Emergency Support</p>
                </div>
            </div>

            <nav class="flex-1 px-4 py-2 space-y-1">
                <a href="user_dash.html"
                    class="flex items-center gap-3 px-4 py-3 hover:bg-primary/10 hover:text-primary rounded">
                    <span class="material-symbols-outlined">dashboard</span> Dashboard
                </a>

                <a href="service_history.html"
                    class="flex items-center gap-3 px-4 py-3 hover:bg-primary/10 hover:text-primary rounded">
                    <span class="material-symbols-outlined">history</span> Request History
                </a>

                <a href="my_vehicles.html"
                    class="flex items-center gap-3 px-4 py-3 hover:bg-primary/10 hover:text-primary rounded">
                    <span class="material-symbols-outlined">directions_car</span> My Vehicles
                </a>

                <div class="pt-4 mt-4 border-t border-slate-200 dark:border-slate-800">
                    <a href="settings.html"
                        class="flex items-center gap-3 px-4 py-3 bg-primary text-white rounded shadow-lg">
                        <span class="material-symbols-outlined">settings</span> Settings
                    </a>
                </div>
            </nav>

            <!-- USER PROFILE -->
            <div class="p-4 mt-auto">
                <button onclick="logout()"
                    class="w-full bg-slate-50 dark:bg-[#27211b] p-4 rounded-xl flex items-center gap-3 border hover:bg-red-500/10 transition">
                    <div id="sideProfilePhoto"
                        class="size-10 rounded-full bg-primary text-white flex items-center justify-center overflow-hidden">
                        U</div>
                    <div class="text-left">
                        <p id="userName" class="text-sm font-semibold">User</p>
                        <p class="text-xs text-slate-500">RESQ Member</p>
                    </div>
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto">

                <header class="mb-12">
                    <h2 class="text-4xl font-black">Account Settings</h2>
                    <p class="text-slate-500">Update your personal information and profile appearance.</p>
                </header>

                <form id="settingsForm" class="space-y-8" onsubmit="updateProfile(event)">

                    <!-- Profile Photo -->
                    <div class="flex flex-col md:flex-row gap-8 items-start">
                        <div class="relative group">
                            <div id="photoPreview"
                                class="size-32 rounded-full bg-slate-200 dark:bg-[#27211b] overflow-hidden border-4 border-primary flex items-center justify-center">
                                <span class="material-symbols-outlined text-4xl text-slate-400">person</span>
                            </div>
                            <label for="photoInput"
                                class="absolute bottom-0 right-0 size-10 bg-primary rounded-full flex items-center justify-center cursor-pointer shadow-lg hover:scale-110 transition">
                                <span class="material-symbols-outlined text-white text-xl">photo_camera</span>
                                <input type="file" id="photoInput" accept="image/*" class="hidden"
                                    onchange="previewPhoto(event)">
                            </label>
                        </div>
                        <div class="flex-1 space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-bold opacity-70">Full Name</label>
                                    <input type="text" id="editName"
                                        class="w-full bg-white dark:bg-[#181411] border-slate-200 dark:border-slate-800 rounded-xl p-3 focus:border-primary focus:ring-1 focus:ring-primary"
                                        required>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-bold opacity-70">Email Address</label>
                                    <input type="email" id="editEmail"
                                        class="w-full bg-white dark:bg-[#181411] border-slate-200 dark:border-slate-800 rounded-xl p-3 focus:border-primary focus:ring-1 focus:ring-primary"
                                        placeholder="name@example.com">
                                </div>
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold opacity-70">Bio</label>
                                <textarea id="editBio"
                                    class="w-full bg-white dark:bg-[#181411] border-slate-200 dark:border-slate-800 rounded-xl p-3 focus:border-primary focus:ring-1 focus:ring-primary h-24"
                                    placeholder="Tell us about yourself..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Additional Info -->
                    <div
                        class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-slate-200 dark:border-slate-800">
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-bold opacity-70">Date of Birth</label>
                            <input type="date" id="editDob"
                                class="w-full bg-white dark:bg-[#181411] border-slate-200 dark:border-slate-800 rounded-xl p-3 focus:border-primary focus:ring-1 focus:ring-primary">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-bold opacity-70">Permanent Address</label>
                            <textarea id="editAddress"
                                class="w-full bg-white dark:bg-[#181411] border-slate-200 dark:border-slate-800 rounded-xl p-3 focus:border-primary focus:ring-1 focus:ring-primary h-12"></textarea>
                        </div>
                    </div>

                    <div class="pt-8">
                        <button type="submit"
                            class="w-full md:w-auto px-12 py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">save</span>
                            Save Changes
                        </button>
                    </div>

                </form>

            </div>
        </main>
    </div>

    <script>
        const phone = localStorage.getItem("phone");

        async function loadProfile() {
            const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
              ? 'http://localhost:5001'
              : 'https://resq-production-4525.up.railway.app';

            try {
                const response = await fetch(`${BACKEND_URL}/api/user/profile/${phone}`);
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById("userName").innerText = user.name || "User";
                    document.getElementById("editName").value = user.name || "";
                    document.getElementById("editEmail").value = user.email || "";
                    document.getElementById("editBio").value = user.bio || "";
                    document.getElementById("editDob").value = user.dob || "";
                    document.getElementById("editAddress").value = user.address || "";

                    if (user.profilePhoto) {
                        const photoUrl = `${BACKEND_URL}/${user.profilePhoto.replace(/\\/g, '/')}`;
                        document.getElementById("photoPreview").innerHTML = `<img src="${photoUrl}" class="w-full h-full object-cover">`;
                        document.getElementById("sideProfilePhoto").innerHTML = `<img src="${photoUrl}" class="w-full h-full object-cover">`;
                    }
                }
            } catch (err) {
                console.error("Error loading profile:", err);
            }
        }

        function previewPhoto(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById("photoPreview").innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                }
                reader.readAsDataURL(file);
            }
        }

        async function updateProfile(event) {
            event.preventDefault();

            const formData = new FormData();
            formData.append("phone", phone);
            formData.append("name", document.getElementById("editName").value);
            formData.append("email", document.getElementById("editEmail").value);
            formData.append("bio", document.getElementById("editBio").value);
            formData.append("dob", document.getElementById("editDob").value);
            formData.append("address", document.getElementById("editAddress").value);

            const photoFile = document.getElementById("photoInput").files[0];
            if (photoFile) {
                formData.append("photo", photoFile);
            }

            try {
                const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                  ? 'http://localhost:5001'
                  : 'https://resq-production-4525.up.railway.app';

                const response = await fetch(`${BACKEND_URL}/api/user/profile`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert("Profile updated successfully!");
                    location.reload();
                } else {
                    alert("Failed to update profile");
                }
            } catch (err) {
                console.error(err);
                alert("Server error");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        loadProfile();
    </script>

</body>

</html>
